<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNTaxDB — Cơ sở dữ liệu Pháp luật Thuế Việt Nam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#028a39;--pri-light:#e8f5ee;--pri-dark:#016b2c;--shadow:0 2px 8px rgba(0,0,0,0.08);--radius:6px;--font:'Segoe UI',Arial,sans-serif;--trans:0.15s}
body{font-family:var(--font);background:#f5f6fa;color:#333;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:var(--font);border:none;background:none;font-size:13px}
input,textarea,select{font-family:var(--font);font-size:13px;outline:none}
a{color:var(--pri);text-decoration:none}

/* HEADER */
#header{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;display:flex;flex-direction:column;position:relative;z-index:100}
#header-top{display:flex;align-items:center;height:48px;gap:16px}
#logo{font-size:20px;font-weight:700;color:var(--pri);white-space:nowrap;letter-spacing:-0.5px}
#nav-tabs{display:flex;gap:2px;margin-left:8px}
.nav-tab{padding:8px 14px;border-radius:var(--radius) var(--radius) 0 0;font-size:13px;font-weight:500;color:#555;transition:var(--trans);border-bottom:2px solid transparent}
.nav-tab:hover{background:var(--pri-light);color:var(--pri)}
.nav-tab.active{color:var(--pri);border-bottom-color:var(--pri);background:var(--pri-light)}
#stats{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
#auth-area{display:flex;align-items:center;gap:8px;margin-left:12px;white-space:nowrap}
#auth-area .user-name{font-size:13px;color:var(--pri);font-weight:500}
.btn{padding:6px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:var(--trans)}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-dark)}
.btn-out{border:1px solid #ddd;color:#555}.btn-out:hover{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:4px 10px;font-size:12px}

/* SEARCH */
#search-row{display:flex;align-items:center;gap:8px;padding:8px 0}
#search-input{flex:1;padding:8px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:14px;transition:var(--trans)}
#search-input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,0.1)}

/* FILTERS */
#filter-row{display:flex;align-items:center;gap:6px;padding:0 0 8px;flex-wrap:wrap}
.filter-select{padding:5px 8px;border:1px solid #ddd;border-radius:var(--radius);background:#fff;font-size:12px;color:#555;cursor:pointer}
.filter-select:focus{border-color:var(--pri)}
.mode-group{display:flex;gap:0;margin-left:4px}
.mode-btn{padding:5px 10px;border:1px solid #ddd;font-size:12px;color:#555;background:#fff}
.mode-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.mode-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.mode-btn:not(:first-child){border-left:none}
.mode-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
#reset-btn{font-size:12px;color:#888;padding:5px 8px}
#reset-btn:hover{color:var(--pri)}

/* MAIN LAYOUT */
#main{display:flex;height:calc(100vh - var(--header-h))}
#tab-search{display:flex;flex:1;overflow:hidden}
#tab-ai,#tab-factcheck{display:none;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:200px;min-width:120px;background:#fff;border-right:1px solid #e8e8e8;overflow-y:auto;padding:12px 0;flex-shrink:0}
#sidebar h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;padding:0 12px 8px}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;font-size:13px;color:#444;cursor:pointer;transition:var(--trans)}
.cat-item:hover{background:var(--pri-light);color:var(--pri)}
.cat-item.active{background:var(--pri-light);color:var(--pri);font-weight:600}
.cat-count{font-size:11px;background:#eee;border-radius:10px;padding:1px 7px;color:#888}
.cat-item.active .cat-count{background:var(--pri);color:#fff}

/* DRAG HANDLES */
.drag-handle{width:4px;background:#f0f0f0;cursor:col-resize;flex-shrink:0;transition:background var(--trans)}
.drag-handle:hover,.drag-handle.dragging{background:var(--pri)}

/* RESULTS */
#results-panel{width:360px;min-width:240px;overflow-y:auto;background:#fafafa;border-right:1px solid #e8e8e8;flex-shrink:0}
#results-header{padding:10px 12px;font-size:12px;color:#888;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:1;display:flex;justify-content:space-between;align-items:center}
.result-card{padding:10px 12px;border-bottom:1px solid #eee;cursor:pointer;transition:var(--trans);border-left:3px solid transparent}
.result-card:hover{background:#f0f0f0}
.result-card.active{border-left-color:var(--pri);background:var(--pri-light)}
.result-title{font-size:13px;font-weight:600;color:var(--pri);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.result-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;line-height:1.6}
.badge-loai{background:#eee;color:#555}
.badge-sac-thue{color:#fff;font-size:10px}
.badge-year{background:#e3f2fd;color:#1565c0}
.badge-status-ok{background:#e8f5e9;color:#2e7d32}
.badge-status-expired{background:#fce4ec;color:#c62828}
.result-snippet{font-size:12px;color:#777;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
#pagination{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px;border-top:1px solid #eee;background:#fff;position:sticky;bottom:0}
#pagination button{padding:4px 12px;border:1px solid #ddd;border-radius:var(--radius);font-size:12px;background:#fff;color:#555}
#pagination button:hover:not(:disabled){border-color:var(--pri);color:var(--pri)}
#pagination button:disabled{opacity:0.4;cursor:default}
#pagination span{font-size:12px;color:#888}

/* PREVIEW */
#preview-panel{flex:1;display:flex;flex-direction:column;background:#fff;overflow:hidden;min-width:300px}
#preview-toolbar{padding:8px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;background:#fafafa;min-height:40px;flex-shrink:0}
#preview-toolbar .doc-title{font-size:13px;font-weight:600;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#preview-content{flex:1;overflow-y:auto;padding:16px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:14px;gap:8px}
.empty-state .icon{font-size:48px}

/* AI TAB */
#ai-container{max-width:800px;margin:0 auto;padding:20px;height:100%;display:flex;flex-direction:column;overflow-y:auto}
#ai-question{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:var(--radius);font-size:14px;resize:vertical;transition:var(--trans)}
#ai-question:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,0.1)}
#ai-chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.chip{padding:6px 12px;background:var(--pri-light);border-radius:16px;font-size:12px;color:var(--pri);cursor:pointer;transition:var(--trans)}
.chip:hover{background:var(--pri);color:#fff}
#ai-submit-row{display:flex;gap:8px;margin:10px 0}
#ai-output{flex:1;overflow-y:auto;padding:16px 0}
#ai-output h3{color:var(--pri);margin:16px 0 8px;font-size:15px}
#ai-output ul{padding-left:20px;margin:6px 0}
#ai-output li{margin:3px 0;line-height:1.5}
#ai-output p{line-height:1.6;margin:6px 0}
#ai-actions{display:flex;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.lock-msg{text-align:center;padding:40px;color:#888;font-size:14px}

/* FACTCHECK TAB */
#fc-container{max-width:800px;margin:0 auto;padding:20px;height:100%;display:flex;flex-direction:column;overflow-y:auto}
#fc-input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:var(--radius);font-size:14px;resize:vertical}
#fc-input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,0.1)}
#fc-results{margin-top:16px;flex:1;overflow-y:auto}
#fc-results table{width:100%;border-collapse:collapse;font-size:13px}
#fc-results th{text-align:left;padding:8px;background:#f5f5f5;border-bottom:2px solid #ddd;font-weight:600;color:#555}
#fc-results td{padding:8px;border-bottom:1px solid #eee}

/* AUTH MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#auth-modal{background:#fff;border-radius:10px;padding:28px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
#auth-modal h2{font-size:18px;color:var(--pri);margin-bottom:16px;text-align:center}
#auth-modal .field{margin-bottom:12px}
#auth-modal label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
#auth-modal input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:var(--radius);font-size:14px}
#auth-modal input:focus{border-color:var(--pri)}
#auth-modal .error{color:#d32f2f;font-size:12px;margin-top:4px;display:none}
#auth-modal .actions{display:flex;gap:8px;margin-top:16px}
#auth-modal .actions button{flex:1}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}

/* LOADING */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{text-align:center;padding:20px;color:#888;font-size:13px}

/* SOURCE TABS in results header */
.source-tabs{display:flex;gap:2px}
.source-tab{padding:3px 8px;border-radius:3px;font-size:11px;color:#888;cursor:pointer}
.source-tab:hover{background:#eee}
.source-tab.active{background:var(--pri);color:#fff}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-top">
    <div id="logo">&#9878;&#65039; VNTaxDB</div>
    <div id="nav-tabs">
      <button class="nav-tab active" data-tab="search">&#128270; Tra c&#7913;u</button>

  </div>
  <div id="filter-row">
    <select class="filter-select" id="f-loai"><option value="">Lo&#7841;i VB &#9660;</option><option value="Lu&#7853;t">&#127963;&#65039; Lu&#7853;t</option><option value="N&#272;">&#128203; Ngh&#7883; &#273;&#7883;nh</option><option value="TT">&#128196; Th&#244;ng t&#432;</option><option value="VBHN">&#128279; VBHN</option><option value="Q&#272;">&#128204; Quy&#7871;t &#273;&#7883;nh</option><option value="NQ">&#128220; Ngh&#7883; quy&#7871;t</option></select>
    <select class="filter-select" id="f-sac-thue"><option value="">S&#7855;c thu&#7871; &#9660;</option><option value="QLT">Qu&#7843;n l&#253; thu&#7871;</option><option value="TNDN">Thu&#7871; TNDN</option><option value="GTGT">Thu&#7871; GTGT</option><option value="TNCN">Thu&#7871; TNCN</option><option value="TTDB">Thu&#7871; TTDB</option><option value="NHA_THAU">Nh&#224; th&#7847;u</option><option value="GDLK">Giao d&#7883;ch LK</option><option value="HKD">H&#7897; KD</option><option value="HOA_DON">H&#243;a &#273;&#417;n</option></select>

</div>

<!-- MAIN -->
<div id="main">
  <!-- SEARCH TAB -->
  <div id="tab-search">
    <div id="sidebar">
      <h3>DANH M&#7908;C</h3>
      <div id="cat-list"></div>
    </div>
    <div class="drag-handle" id="drag1"></div>
    <div id="results-panel">
      <div id="results-header">
        <span id="results-count">0 k&#7871;t qu&#7843;</span>
        <div class="source-tabs">
          <button class="source-tab active" data-source="all">T&#7845;t c&#7843;</button>
          <button class="source-tab" data-source="document">V&#259;n b&#7843;n</button>

      </div>

      <div id="pagination">

    <div id="preview-panel">
      <div id="preview-toolbar">
        <span class="doc-title" id="preview-title"></span>
        <button class="btn btn-out btn-sm" id="btn-analyze" style="display:none" onclick="analyzeCurrentDoc()">&#129302; Ph&#226;n t&#237;ch VB n&#224;y</button>

      </div>
      <div id="preview-content">
        <div class="empty-state"><span class="icon">&#128196;</span><span>Ch&#7885;n m&#7897;t v&#259;n b&#7843;n &#273;&#7875; xem n&#7897;i dung</span></div>

  <!-- AI TAB -->
  <div id="tab-ai">

      <div id="ai-lock" class="lock-msg" style="display:none">&#128274; &#272;&#259;ng nh&#7853;p &#273;&#7875; s&#7917; d&#7909;ng t&#237;nh n&#259;ng AI</div>
      <div id="ai-main">

          <span class="chip" onclick="askAI(this.textContent)">Ti&#7873;n thu&#234; nh&#224; c&#243; &#273;&#432;&#7907;c kh&#7845;u tr&#7915; TNDN?</span>

      <button class="btn btn-out" onclick="hideAuth()">H&#7911;y</button>

    </div>

<script>
// ── State ──
const S = {
  query: '', filters: {loai:'',sac_thue:'',tinh_trang:'',year:''}, mode: 'keyword',
  source: 'all', offset: 0, limit: 20, total: 0,
  results: [], currentDoc: null, token: localStorage.getItem('vntaxdb_token'),
  username: localStorage.getItem('vntaxdb_username'), aiText: '', activeCat: ''
};

const SAC_THUE = {QLT:'Quản lý thuế',TNDN:'Thuế TNDN',GTGT:'Thuế GTGT',TNCN:'Thuế TNCN',
  TTDB:'Thuế TTĐB',NHA_THAU:'Nhà thầu',GDLK:'Giao dịch LK',HKD:'Hộ KD',HOA_DON:'Hóa đơn'};
const LOAI_ICON = {'Luật':'🏛️','NĐ':'📋','TT':'📄','VBHN':'🔗','QĐ':'📌','NQ':'📜','CV':'📧','Khác':'📎'};
const SAC_COLORS = {QLT:'#607d8b',TNDN:'#e65100',GTGT:'#1565c0',TNCN:'#6a1b9a',
  TTDB:'#c62828',NHA_THAU:'#00838f',GDLK:'#4527a0',HKD:'#2e7d32',HOA_DON:'#ef6c00'};

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  calcHeaderHeight();
  initYearFilter();
  initTabs();
  initDragHandles();
  initSearch();
  updateAuthUI();
  loadStats();
  doSearch();
});

function calcHeaderHeight() {
  const h = document.getElementById('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}

function initYearFilter() {
  const sel = document.getElementById('f-year');
  const now = new Date().getFullYear();
  for (let y = now; y >= 2000; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y; sel.appendChild(o);
  }
}

// ── Tabs ──
function initTabs() {
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.dataset.tab;
      document.getElementById('tab-search').style.display = tab === 'search' ? 'flex' : 'none';
      document.getElementById('tab-ai').style.display = tab === 'ai' ? 'flex' : 'none';
      document.getElementById('tab-factcheck').style.display = tab === 'factcheck' ? 'flex' : 'none';
      if (tab === 'ai') checkAIAccess();
      if (tab === 'factcheck') checkFCAccess();
    });
  });
  // Source tabs
  document.querySelectorAll('.source-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.source-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      S.source = t.dataset.source;
      S.offset = 0;
      doSearch();
    });
  });
  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      S.mode = b.dataset.mode;
      S.offset = 0;
      doSearch();
    });
  });
}

// ── Drag handles ──
function initDragHandles() {
  setupDrag('drag1', 'sidebar', 'left');
  setupDrag('drag2', 'results-panel', 'left');
}

function setupDrag(handleId, panelId, side) {
  const handle = document.getElementById(handleId);
  const panel = document.getElementById(panelId);
  let startX, startW;
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    const onMove = ev => {
      const diff = ev.clientX - startX;
      panel.style.width = Math.max(100, startW + diff) + 'px';
    };
    const onUp = () => {
      handle.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Search ──
let searchTimer = null;
function initSearch() {
  const inp = document.getElementById('search-input');
  inp.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { S.query = inp.value.trim(); S.offset = 0; doSearch(); }, 300);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { clearTimeout(searchTimer); S.query = inp.value.trim(); S.offset = 0; doSearch(); }
  });
  // Filter changes
  ['f-loai','f-sac-thue','f-year','f-tinh-trang'].forEach(id => {
    document.getElementById(id).addEventListener('change', function() {
      const key = {
        'f-loai':'loai','f-sac-thue':'sac_thue','f-year':'year','f-tinh-trang':'tinh_trang'
      }[id];
      S.filters[key] = this.value;
      S.offset = 0;
      doSearch();
    });
  });
}

function resetFilters() {
  S.filters = {loai:'',sac_thue:'',tinh_trang:'',year:''};
  S.query = ''; S.offset = 0; S.activeCat = '';
  document.getElementById('search-input').value = '';
  document.getElementById('f-loai').value = '';
  document.getElementById('f-sac-thue').value = '';
  document.getElementById('f-year').value = '';
  document.getElementById('f-tinh-trang').value = '';
  doSearch();
}

async function doSearch() {
  const params = new URLSearchParams();
  if (S.query) params.set('q', S.query);
  if (S.source !== 'all') params.set('type', S.source);
  if (S.filters.loai) params.set('loai', S.filters.loai);
  if (S.filters.sac_thue) params.set('sac_thue', S.filters.sac_thue);
  if (S.filters.tinh_trang) params.set('tinh_trang', S.filters.tinh_trang);
  if (S.filters.year) params.set('year', S.filters.year);
  params.set('limit', S.limit);
  params.set('offset', S.offset);

  document.getElementById('results-list').innerHTML = '<div class="loading-row"><span class="spinner"></span> Đang tìm...</div>';

  try {
    const resp = await fetch('/api/search?' + params);
    const data = await resp.json();

    // Merge results from documents and cong_van
    let items = [];
    let total = 0;
    if (data.documents) {
      data.documents.items.forEach(d => { d._source = 'documents'; });
      items = items.concat(data.documents.items);
      total += data.documents.total;
    }
    if (data.cong_van) {
      data.cong_van.items.forEach(d => { d._source = 'cong_van'; });
      items = items.concat(data.cong_van.items);
      total += data.cong_van.total;
    }

    S.results = items;
    S.total = total;
    renderResults();
    renderSidebar();
    updatePagination();
  } catch (e) {
    document.getElementById('results-list').innerHTML = '<div class="loading-row">Lỗi tải dữ liệu</div>';
  }
}

function renderResults() {
  const list = document.getElementById('results-list');
  if (!S.results.length) {
    list.innerHTML = '<div class="loading-row">Không tìm thấy kết quả</div>';
    document.getElementById('results-count').textContent = '0 kết quả';
    return;
  }
  document.getElementById('results-count').textContent = S.total + ' kết quả';

  list.innerHTML = S.results.map((r, i) => {
    const loai = r.loai || '';
    const icon = LOAI_ICON[loai] || '📎';
    const year = r.ngay_ban_hanh ? r.ngay_ban_hanh.substring(0, 4) : '';
    const status = r.tinh_trang || '';
    const isOk = status.toLowerCase().includes('còn hiệu lực');
    const isExpired = status.toLowerCase().includes('hết hiệu lực');
    const sacArr = r.sac_thue || [];
    const snippet = r.tom_tat || r.ket_luan || '';
    const sourceLabel = r._source === 'cong_van' ? ' CV' : '';

    return `<div class="result-card" data-idx="${i}" onclick="selectResult(${i})">
      <div class="result-title">${esc(r.ten || r.so_hieu || 'Không có tiêu đề')}</div>
      <div class="result-meta">
        <span class="badge badge-loai">${icon} ${esc(loai)}${sourceLabel}</span>
        ${sacArr.map(s => `<span class="badge badge-sac-thue" style="background:${SAC_COLORS[s]||'#666'}">${esc(SAC_THUE[s]||s)}</span>`).join('')}
        ${year ? `<span class="badge badge-year">${year}</span>` : ''}
        ${isOk ? '<span class="badge badge-status-ok">✅ Còn HL</span>' : ''}
        ${isExpired ? '<span class="badge badge-status-expired">❌ Hết HL</span>' : ''}
      </div>
      ${snippet ? `<div class="result-snippet">${esc(snippet)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderSidebar() {
  const counts = {};
  S.results.forEach(r => {
    (r.sac_thue || []).forEach(s => { counts[s] = (counts[s] || 0) + 1; });
  });
  const catList = document.getElementById('cat-list');
  const all = Object.entries(SAC_THUE);
  catList.innerHTML = all.map(([k, v]) => {
    const c = counts[k] || 0;
    const active = S.activeCat === k ? ' active' : '';
    return `<div class="cat-item${active}" onclick="toggleCat('${k}')">
      <span>${v}</span><span class="cat-count">${c}</span>
    </div>`;
  }).join('');
}

function toggleCat(k) {
  if (S.activeCat === k) {
    S.activeCat = '';
    S.filters.sac_thue = '';
    document.getElementById('f-sac-thue').value = '';
  } else {
    S.activeCat = k;
    S.filters.sac_thue = k;
    document.getElementById('f-sac-thue').value = k;
  }
  S.offset = 0;
  doSearch();
}

function updatePagination() {
  const totalPages = Math.max(1, Math.ceil(S.total / S.limit));
  const curPage = Math.floor(S.offset / S.limit) + 1;
  document.getElementById('pg-info').textContent = curPage + '/' + totalPages;
  document.getElementById('pg-prev').disabled = curPage <= 1;
  document.getElementById('pg-next').disabled = curPage >= totalPages;
}

function changePage(dir) {
  S.offset += dir * S.limit;
  if (S.offset < 0) S.offset = 0;
  doSearch();
}

// ── Select result / Preview ──
async function selectResult(idx) {
  const r = S.results[idx];
  if (!r) return;
  // Highlight active
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.result-card[data-idx="${idx}"]`)?.classList.add('active');

  S.currentDoc = r;
  document.getElementById('preview-title').textContent = r.so_hieu + ' — ' + (r.ten || '');
  document.getElementById('btn-analyze').style.display = '';
  document.getElementById('btn-open-tab').style.display = r.link_tvpl ? '' : 'none';
  document.getElementById('preview-content').innerHTML = '<div class="loading-row"><span class="spinner"></span> Đang tải...</div>';

  try {
    const endpoint = r._source === 'cong_van' ? '/api/cong-van/' : '/api/documents/';
    const resp = await fetch(endpoint + encodeURIComponent(r.so_hieu));
    if (!resp.ok) throw new Error('Not found');
    const doc = await resp.json();
    S.currentDoc = {...r, ...doc};
    renderPreview(doc, r._source);
  } catch {
    document.getElementById('preview-content').innerHTML = '<div class="loading-row">Không tải được nội dung</div>';
  }
}

function renderPreview(doc, source) {
  const el = document.getElementById('preview-content');
  let html = '<div style="padding:4px 0">';

  // Meta info
  html += '<div style="margin-bottom:12px;font-size:12px;color:#888">';
  if (doc.so_hieu) html += `<strong>Số hiệu:</strong> ${esc(doc.so_hieu)} &nbsp;|&nbsp; `;
  if (doc.loai) html += `<strong>Loại:</strong> ${esc(doc.loai)} &nbsp;|&nbsp; `;
  if (doc.co_quan) html += `<strong>Cơ quan:</strong> ${esc(doc.co_quan)} &nbsp;|&nbsp; `;
  if (doc.ngay_ban_hanh) html += `<strong>Ngày:</strong> ${formatDate(doc.ngay_ban_hanh)}`;
  if (doc.tinh_trang) {
    const ok = doc.tinh_trang.toLowerCase().includes('còn hiệu lực');
    html += ` &nbsp;|&nbsp; <strong>Hiệu lực:</strong> <span style="color:${ok?'#2e7d32':'#c62828'}">${esc(doc.tinh_trang)}</span>`;
  }
  html += '</div>';

  // Summary
  if (doc.tom_tat) {
    html += `<div style="background:#f9f9f9;padding:10px;border-radius:6px;margin-bottom:12px;font-size:13px;line-height:1.6;border-left:3px solid var(--pri)"><strong>Tóm tắt:</strong> ${esc(doc.tom_tat)}</div>`;
  }

  // Lưu ý
  if (doc.luu_y) {
    html += `<div style="background:#fff3e0;padding:10px;border-radius:6px;margin-bottom:12px;font-size:13px;line-height:1.6;border-left:3px solid #ef6c00"><strong>Lưu ý:</strong> ${esc(doc.luu_y)}</div>`;
  }

  // Content
  if (source === 'cong_van') {
    if (doc.ket_luan) html += `<div style="margin-bottom:12px"><strong>Kết luận:</strong><div style="margin-top:6px;line-height:1.6">${esc(doc.ket_luan)}</div></div>`;
    if (doc.noi_dung_day_du) html += `<div style="line-height:1.6;white-space:pre-wrap">${esc(doc.noi_dung_day_du)}</div>`;
  } else {
    if (doc.noi_dung) {
      html += `<div style="line-height:1.6;white-space:pre-wrap">${esc(doc.noi_dung)}</div>`;
    } else if (doc.link_tvpl || doc.link_vbpl) {
      const link = doc.link_tvpl || doc.link_vbpl;
      html += `<div style="text-align:center;padding:20px"><a href="${esc(link)}" target="_blank" class="btn btn-pri">↗ Xem trên nguồn gốc</a></div>`;
    }
  }

  // Tags / keywords
  if (doc.tu_khoa && doc.tu_khoa.length) {
    html += `<div style="margin-top:12px;padding-top:8px;border-top:1px solid #eee"><strong style="font-size:12px;color:#888">Từ khóa:</strong> ${doc.tu_khoa.map(t => `<span style="display:inline-block;background:#eee;padding:2px 8px;border-radius:3px;font-size:11px;margin:2px">${esc(t)}</span>`).join(' ')}</div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

function openDocNewTab() {
  if (S.currentDoc?.link_tvpl) window.open(S.currentDoc.link_tvpl, '_blank');
  else if (S.currentDoc?.link_vbpl) window.open(S.currentDoc.link_vbpl, '_blank');
}

function analyzeCurrentDoc() {
  if (!S.currentDoc) return;
  // Switch to AI tab
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.querySelector('.nav-tab[data-tab="ai"]').classList.add('active');
  document.getElementById('tab-search').style.display = 'none';
  document.getElementById('tab-ai').style.display = 'flex';
  document.getElementById('tab-factcheck').style.display = 'none';
  checkAIAccess();
  // Auto-fill question
  const q = `Phân tích văn bản ${S.currentDoc.so_hieu}: ${S.currentDoc.ten || ''}. Nêu các quy định chính, điều kiện áp dụng, và lưu ý quan trọng.`;
  document.getElementById('ai-question').value = q;
  submitAI();
}

// ── Stats ──
async function loadStats() {
  try {
    const resp = await fetch('/api/search?limit=1&offset=0');
    const data = await resp.json();
    const docs = data.documents?.total || 0;
    const cvs = data.cong_van?.total || 0;
    document.getElementById('stats').textContent = `${docs} văn bản · ${cvs} công văn`;
  } catch {}
}

// ── AI ──
function checkAIAccess() {
  const locked = !S.token;
  document.getElementById('ai-lock').style.display = locked ? '' : 'none';
  document.getElementById('ai-main').style.display = locked ? 'none' : '';
}

function askAI(text) {
  document.getElementById('ai-question').value = text;
  submitAI();
}

async function submitAI() {
  if (!S.token) { showAuth(); return; }
  const q = document.getElementById('ai-question').value.trim();
  if (!q) return;

  const out = document.getElementById('ai-output');
  out.innerHTML = '<div class="loading-row"><span class="spinner"></span> Đang phân tích...</div>';
  document.getElementById('ai-actions').style.display = 'none';
  document.getElementById('ai-submit-btn').disabled = true;
  S.aiText = '';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body: JSON.stringify({question: q})
    });

    if (resp.status === 401) { S.token = null; localStorage.removeItem('vntaxdb_token'); updateAuthUI(); showAuth(); return; }
    if (!resp.ok) throw new Error('API error');

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let fullText = '';
    out.innerHTML = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = dec.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const d = JSON.parse(payload);
          if (d.text) fullText += d.text;
        } catch {}
      }
      out.innerHTML = renderMarkdown(fullText);
    }

    S.aiText = fullText;
    out.innerHTML = renderMarkdown(fullText);
    document.getElementById('ai-actions').style.display = 'flex';
  } catch (e) {
    out.innerHTML = '<div class="loading-row">Lỗi khi phân tích. Vui lòng thử lại.</div>';
  } finally {
    document.getElementById('ai-submit-btn').disabled = false;
  }
}

function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm, '<h4 style="color:var(--pri);margin:12px 0 6px">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="color:var(--pri);margin:14px 0 8px">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul style="padding-left:20px;margin:4px 0">$1</ul>')
    .replace(/\n{2,}/g, '</p><p style="line-height:1.6;margin:6px 0">')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p style="line-height:1.6;margin:6px 0">').replace(/$/, '</p>');
}

function copyAI() {
  navigator.clipboard.writeText(S.aiText).then(() => {
    const btn = document.querySelector('#ai-actions button');
    const orig = btn.textContent;
    btn.textContent = '✓ Đã sao chép';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function downloadAI() {
  const blob = new Blob([S.aiText], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vntaxdb-ai-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Factcheck ──
function checkFCAccess() {
  const locked = !S.token;
  document.getElementById('fc-lock').style.display = locked ? '' : 'none';
  document.getElementById('fc-main').style.display = locked ? 'none' : '';
}

async function submitFactcheck() {
  if (!S.token) { showAuth(); return; }
  const text = document.getElementById('fc-input').value.trim();
  if (!text) return;

  const out = document.getElementById('fc-results');
  out.innerHTML = '<div class="loading-row"><span class="spinner"></span> Đang kiểm tra...</div>';

  try {
    // Use chat endpoint with a factcheck prompt
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body: JSON.stringify({question: `Fact-check đoạn văn sau. Xác định các văn bản pháp luật được trích dẫn, kiểm tra xem chúng có trong cơ sở dữ liệu không, và đánh giá tình trạng hiệu lực:\n\n${text}`})
    });

    if (resp.status === 401) { S.token = null; localStorage.removeItem('vntaxdb_token'); updateAuthUI(); showAuth(); return; }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let fullText = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = dec.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const d = JSON.parse(payload);
          if (d.text) fullText += d.text;
        } catch {}
      }
    }

    out.innerHTML = renderMarkdown(fullText);
  } catch {
    out.innerHTML = '<div class="loading-row">Lỗi khi kiểm tra</div>';
  }
}

// ── Auth ──
function showAuth() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('auth-user').focus();
  document.getElementById('auth-error').style.display = 'none';
}

function hideAuth() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('auth-user').value = '';
  document.getElementById('auth-pass').value = '';
}

async function doLogin() {
  const username = document.getElementById('auth-user').value.trim();
  const password = document.getElementById('auth-pass').value;
  if (!username || !password) return;

  const errEl = document.getElementById('auth-error');
  try {
    const resp = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (!resp.ok) {
      errEl.textContent = 'Sai tên đăng nhập hoặc mật khẩu';
      errEl.style.display = 'block';
      return;
    }
    const data = await resp.json();
    S.token = data.access_token;
    S.username = data.username;
    localStorage.setItem('vntaxdb_token', S.token);
    localStorage.setItem('vntaxdb_username', S.username);
    hideAuth();
    updateAuthUI();
  } catch {
    errEl.textContent = 'Lỗi kết nối';
    errEl.style.display = 'block';
  }
}

function logout() {
  S.token = null; S.username = null;
  localStorage.removeItem('vntaxdb_token');
  localStorage.removeItem('vntaxdb_username');
  updateAuthUI();
}

function updateAuthUI() {
  const loggedIn = !!S.token;
  document.getElementById('login-btn').style.display = loggedIn ? 'none' : '';
  document.getElementById('logout-btn').style.display = loggedIn ? '' : 'none';
  document.getElementById('user-greeting').style.display = loggedIn ? '' : 'none';
  if (loggedIn) document.getElementById('user-greeting').textContent = 'Xin chào, ' + (S.username || 'User');
}

// Enter key in auth modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('show')) doLogin();
  if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('show')) hideAuth();
});

// ── Helpers ──
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return ''; try { const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } catch { return d; } }

// ── Resize observer for header ──
new ResizeObserver(calcHeaderHeight).observe(document.getElementById('header'));
</script>
