<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VNTaxDB — Cơ sở dữ liệu Pháp luật Thuế Việt Nam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#028a39;--lt:#e8f5ee;--dk:#016b2c;--shadow:0 2px 8px rgba(0,0,0,.08);--r:6px;--f:'Segoe UI',Arial,sans-serif;--t:.15s}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:#f5f6fa;color:#333}
button{cursor:pointer;font-family:var(--f);border:none;background:none;font-size:13px}
input,textarea,select{font-family:var(--f);font-size:13px;outline:none}
a{color:var(--pri);text-decoration:none}

/* ── HEADER ── */
#hdr{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;height:46px;gap:12px}
.logo{font-size:20px;font-weight:700;color:var(--pri);letter-spacing:-.5px;white-space:nowrap}
.tabs{display:flex;gap:2px}
.tab{padding:8px 14px;border-radius:var(--r) var(--r) 0 0;font-size:13px;font-weight:500;color:#666;border-bottom:2px solid transparent;transition:var(--t)}
.tab:hover{background:var(--lt);color:var(--pri)}
.tab.on{color:var(--pri);border-bottom-color:var(--pri);background:var(--lt)}
#stats{font-size:12px;color:#999;margin-left:auto;white-space:nowrap}
#auth-area{display:flex;align-items:center;gap:8px;margin-left:8px;white-space:nowrap;font-size:13px}
.btn{padding:6px 14px;border-radius:var(--r);font-size:13px;font-weight:500;transition:var(--t)}
.bp{background:var(--pri);color:#fff}.bp:hover{background:var(--dk)}
.bo{border:1px solid #ddd;color:#555}.bo:hover{border-color:var(--pri);color:var(--pri)}
.bs{padding:4px 10px;font-size:12px}
.search-row{padding:6px 0}
#q{width:100%;padding:9px 16px;border:1.5px solid #ddd;border-radius:20px;font-size:14px;transition:var(--t)}
#q:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,.12)}
.frow{display:flex;align-items:center;gap:6px;padding:0 0 8px;flex-wrap:wrap}
.fsel{padding:5px 8px;border:1px solid #ddd;border-radius:var(--r);background:#fff;font-size:12px;color:#555;cursor:pointer}
.fsel:focus{border-color:var(--pri)}
.mg{display:flex}
.mb{padding:5px 10px;border:1px solid #ddd;font-size:12px;color:#555;background:#fff;transition:var(--t)}
.mb:first-child{border-radius:var(--r) 0 0 var(--r)}
.mb:last-child{border-radius:0 var(--r) var(--r) 0}
.mb+.mb{border-left:none}
.mb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
#resetf{font-size:12px;color:#999;padding:5px 8px}
#resetf:hover{color:var(--pri)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#main{display:flex;flex:1;overflow:hidden}
.pane-search{display:flex;flex:1;overflow:hidden}
.pane-ai,.pane-fc{display:none;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#side{width:200px;min-width:100px;background:#fff;border-right:1px solid #e8e8e8;overflow-y:auto;flex-shrink:0}
#side h3{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;padding:12px 12px 8px}
.ci{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;font-size:13px;color:#444;cursor:pointer;transition:var(--t)}
.ci:hover{background:var(--lt);color:var(--pri)}
.ci.on{background:var(--lt);color:var(--pri);font-weight:600}
.cc{font-size:11px;background:#eee;border-radius:10px;padding:1px 7px;color:#888;min-width:18px;text-align:center}
.ci.on .cc{background:var(--pri);color:#fff}

/* ── DRAG ── */
.dh{width:4px;background:#f0f0f0;cursor:col-resize;flex-shrink:0;transition:background var(--t)}
.dh:hover,.dh.ing{background:var(--pri)}

/* ── RESULTS ── */
#rpan{width:360px;min-width:220px;display:flex;flex-direction:column;background:#fafafa;border-right:1px solid #e8e8e8;flex-shrink:0;overflow:hidden}
#rhdr{padding:8px 12px;font-size:12px;color:#888;border-bottom:1px solid #eee;background:#fff;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#rlist{flex:1;overflow-y:auto}
.rc{padding:10px 12px;border-bottom:1px solid #eee;cursor:pointer;transition:var(--t);border-left:3px solid transparent}
.rc:hover{background:#f0f0f0}
.rc.on{border-left-color:var(--pri);background:var(--lt)}
.rt{font-size:13px;font-weight:600;color:var(--pri);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.rm{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.bg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;line-height:1.6}
.bg-l{background:#eee;color:#555}
.bg-y{background:#e3f2fd;color:#1565c0}
.bg-ok{background:#e8f5e9;color:#2e7d32}
.bg-ex{background:#fce4ec;color:#c62828}
.bg-s{color:#fff}
.rs{font-size:12px;color:#777;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
#pagi{display:flex;justify-content:center;align-items:center;gap:8px;padding:10px;border-top:1px solid #eee;background:#fff;flex-shrink:0}
#pagi button{padding:4px 12px;border:1px solid #ddd;border-radius:var(--r);font-size:12px;background:#fff;color:#555}
#pagi button:hover:not(:disabled){border-color:var(--pri);color:var(--pri)}
#pagi button:disabled{opacity:.4;cursor:default}
#pagi span{font-size:12px;color:#888}
.stab{display:flex;gap:2px}
.st{padding:3px 8px;border-radius:3px;font-size:11px;color:#888;cursor:pointer}
.st:hover{background:#eee}
.st.on{background:var(--pri);color:#fff}

/* ── PREVIEW ── */
#ppan{flex:1;display:flex;flex-direction:column;background:#fff;overflow:hidden;min-width:280px}
#ptbar{padding:8px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;background:#fafafa;min-height:40px;flex-shrink:0}
#ptbar .dt{font-size:13px;font-weight:600;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#pcont{flex:1;overflow-y:auto;padding:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:14px;gap:8px}
.empty .ico{font-size:48px}
#preview-iframe{width:100%;height:100%;border:none}

/* ── AI TAB ── */
.ai-wrap{max-width:820px;margin:0 auto;padding:20px;height:100%;display:flex;flex-direction:column;overflow:hidden}
#aiq{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:var(--r);font-size:14px;resize:vertical;transition:var(--t)}
#aiq:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,.12)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.chip{padding:6px 12px;background:var(--lt);border-radius:16px;font-size:12px;color:var(--pri);cursor:pointer;transition:var(--t)}
.chip:hover{background:var(--pri);color:#fff}
.ai-btns{display:flex;gap:8px;margin:10px 0}
#aiout{flex:1;overflow-y:auto;padding:4px 0;line-height:1.65}
#aiout h3{color:var(--pri);margin:14px 0 6px;font-size:15px}
#aiout h4{color:var(--pri);margin:12px 0 4px;font-size:14px}
#aiout ul,#aiout ol{padding-left:20px;margin:4px 0}
#aiout li{margin:3px 0}
#aiout p{margin:5px 0}
#aiout strong{color:#222}
.ai-cite{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;padding:8px 0;border-top:1px solid #eee}
.cite-chip{padding:4px 10px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:var(--r);font-size:11px;color:#555;cursor:pointer;transition:var(--t)}
.cite-chip:hover{border-color:var(--pri);color:var(--pri)}
.ai-acts{display:flex;gap:8px;padding-top:8px;border-top:1px solid #eee;flex-shrink:0}
.lock-msg{text-align:center;padding:40px 20px;color:#888;font-size:14px}

/* ── FC TAB ── */
.fc-wrap{max-width:820px;margin:0 auto;padding:20px;height:100%;display:flex;flex-direction:column;overflow:hidden}
#fcinp{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:var(--r);font-size:14px;resize:vertical}
#fcinp:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(2,138,57,.12)}
#fcout{margin-top:16px;flex:1;overflow-y:auto}
#fcout table{width:100%;border-collapse:collapse;font-size:13px}
#fcout th{text-align:left;padding:8px 10px;background:#f5f5f5;border-bottom:2px solid #ddd;font-weight:600;color:#555}
#fcout td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.st-valid{color:#2e7d32;font-weight:600}
.st-expired{color:#ef6c00;font-weight:600}
.st-notfound{color:#c62828;font-weight:600}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
#overlay.show{display:flex}
#modal{background:#fff;border-radius:10px;padding:28px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
#modal h2{font-size:18px;color:var(--pri);margin-bottom:16px;text-align:center}
.fd{margin-bottom:12px}
.fd label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fd input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:var(--r);font-size:14px}
.fd input:focus{border-color:var(--pri)}
#autherr{color:#d32f2f;font-size:12px;margin-top:4px;display:none}
.modal-mode{display:flex;justify-content:center;gap:16px;margin-bottom:14px;font-size:13px}
.modal-mode span{cursor:pointer;color:#888;padding-bottom:2px;border-bottom:2px solid transparent}
.modal-mode span.on{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}
.macts{display:flex;gap:8px;margin-top:16px}
.macts button{flex:1}
#reg-name{display:none}

/* ── MISC ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--pri);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{text-align:center;padding:20px;color:#999;font-size:13px}
</style>
</head>
<body>
<div id="app">

<!-- ── HEADER ── -->
<div id="hdr">
 <div class="hdr-top">
  <div class="logo">&#9878;&#65039; VNTaxDB</div>
  <div class="tabs">
   <button class="tab on" data-t="search">&#128270; Tra c&#7913;u</button>
   <button class="tab" data-t="ai">&#129302; AI Ph&#226;n t&#237;ch</button>
   <button class="tab" data-t="fc">&#9989; Fact-check</button>
  </div>
  <div id="stats"></div>
  <div id="auth-area">
   <span id="uname" style="display:none;color:var(--pri);font-weight:500"></span>
   <button id="logoutb" class="btn bo bs" style="display:none" onclick="logout()">&#272;&#259;ng xu&#7845;t</button>
   <button id="loginb" class="btn bp bs" onclick="showModal()">&#272;&#259;ng nh&#7853;p</button>
  </div>
 </div>
 <div class="search-row"><input id="q" type="text" placeholder="T&#236;m ki&#7871;m v&#259;n b&#7843;n thu&#7871;... (+TNDN &quot;chi ph&#237; &#273;&#432;&#7907;c tr&#7915;&quot; -h&#7871;t hi&#7879;u l&#7921;c)"></div>
 <div class="frow">
  <select class="fsel" id="fl"><option value="">Lo&#7841;i VB &#9660;</option><option value="Luat">&#127963;&#65039; Lu&#7853;t</option><option value="ND">&#128203; Ngh&#7883; &#273;&#7883;nh</option><option value="TT">&#128196; Th&#244;ng t&#432;</option><option value="VBHN">&#128279; VBHN</option><option value="QD">&#128204; Quy&#7871;t &#273;&#7883;nh</option><option value="NQ">&#128220; Ngh&#7883; quy&#7871;t</option><option value="CV">&#128231; C&#244;ng v&#259;n</option></select>
  <select class="fsel" id="fs"><option value="">S&#7855;c thu&#7871; &#9660;</option><option value="QLT">Qu&#7843;n l&#253; thu&#7871;</option><option value="TNDN">Thu&#7871; TNDN</option><option value="GTGT">Thu&#7871; GTGT</option><option value="TNCN">Thu&#7871; TNCN</option><option value="TTDB">Thu&#7871; TT&#272;B</option><option value="NHA_THAU">Nh&#224; th&#7847;u</option><option value="GDLK">Giao d&#7883;ch LK</option><option value="HKD">H&#7897; KD</option><option value="HOA_DON">H&#243;a &#273;&#417;n</option></select>
  <select class="fsel" id="fy"><option value="">N&#259;m &#9660;</option></select>
  <select class="fsel" id="fh"><option value="">Hi&#7879;u l&#7921;c &#9660;</option><option value="con_hieu_luc">&#9989; C&#242;n hi&#7879;u l&#7921;c</option><option value="het_hieu_luc">&#10060; H&#7871;t hi&#7879;u l&#7921;c</option></select>
  <select class="fsel" id="fn"><option value="">Ngu&#7891;n &#9660;</option><option value="documents">V&#259;n b&#7843;n</option><option value="cong_van">C&#244;ng v&#259;n</option><option value="articles">B&#224;i vi&#7871;t</option></select>
  <div class="mg">
   <button class="mb" data-m="keyword">Keyword</button>
   <button class="mb on" data-m="hybrid">Hybrid</button>
   <button class="mb" data-m="semantic">Semantic</button>
  </div>
  <button id="resetf" onclick="resetAll()">&#8634; Reset</button>
 </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

 <!-- SEARCH PANE -->
 <div class="pane-search" id="psearch">
  <div id="side"><h3>DANH M&#7908;C</h3><div id="cats"></div></div>
  <div class="dh" data-panel="side"></div>
  <div id="rpan">
   <div id="rhdr">
    <span id="rcnt">0 k&#7871;t qu&#7843;</span>
    <div class="stab">
     <button class="st on" data-s="all">T&#7845;t c&#7843;</button>
     <button class="st" data-s="documents">V&#259;n b&#7843;n</button>
     <button class="st" data-s="cong_van">C&#244;ng v&#259;n</button>
     <button class="st" data-s="articles">B&#224;i vi&#7871;t</button>
    </div>
   </div>
   <div id="rlist"></div>
   <div id="pagi">
    <button id="pgp" onclick="goPage(-1)" disabled>&#8592; Tr&#432;&#7899;c</button>
    <span id="pgi">1/1</span>
    <button id="pgn" onclick="goPage(1)" disabled>Sau &#8594;</button>
   </div>
  </div>
  <div class="dh" data-panel="rpan"></div>
  <div id="ppan">
   <div id="ptbar">
    <span class="dt" id="ptitle"></span>
    <button class="btn bo bs" id="banalyze" style="display:none" onclick="analyzeDoc()">&#129302; Ph&#226;n t&#237;ch VB n&#224;y</button>
    <button class="btn bo bs" id="bopen" style="display:none" onclick="openTab()">&#8599; M&#7903; tab m&#7899;i</button>
   </div>
   <div id="pcont"><div class="empty"><span class="ico">&#128196;</span><span>Ch&#7885;n m&#7897;t v&#259;n b&#7843;n &#273;&#7875; xem n&#7897;i dung</span></div></div>
  </div>
 </div>

 <!-- AI PANE -->
 <div class="pane-ai" id="pai">
  <div class="ai-wrap">
   <div id="ai-lock" class="lock-msg" style="display:none">&#128274; &#272;&#259;ng nh&#7853;p &#273;&#7875; s&#7917; d&#7909;ng t&#237;nh n&#259;ng AI</div>
   <div id="ai-main">
    <textarea id="aiq" rows="8" placeholder="Nh&#7853;p c&#226;u h&#7887;i v&#7873; thu&#7871;..."></textarea>
    <div class="chips">
     <span class="chip">Ti&#7873;n thu&#234; nh&#224; c&#243; &#273;&#432;&#7907;c kh&#7845;u tr&#7915; TNDN?</span>

    </div>
    <div class="ai-btns">
     <button class="btn bp" id="aibtn" onclick="submitAI()">&#128269; Ph&#226;n t&#237;ch</button>
    </div>

    <div id="aiout"></div>
    <div id="ai-acts" class="ai-acts" style="display:none">
     <button class="btn bo bs" onclick="copyAI()">&#128203; Sao ch&#233;p</button>
     <button class="btn bo bs" onclick="dlAI()">&#128190; T&#7843;i .txt</button>
    </div>
   </div>
  </div>
 </div>

 <!-- FACTCHECK PANE -->
 <div class="pane-fc" id="pfc">
  <div class="fc-wrap">
   <div id="fc-lock" class="lock-msg" style="display:none">&#128274; &#272;&#259;ng nh&#7853;p &#273;&#7875; s&#7917; d&#7909;ng t&#237;nh n&#259;ng Fact-check</div>
   <div id="fc-main">
    <textarea id="fcinp" rows="8" placeholder="Paste &#273;o&#7841;n v&#259;n c&#7847;n ki&#7875;m tra..."></textarea>
    <div style="margin:10px 0"><button class="btn bp" id="fcbtn" onclick="submitFC()">&#9989; Ki&#7875;m tra</button></div>
    <div id="fcout"></div>
   </div>
  </div>
 </div>

</div><!-- /main -->
</div><!-- /app -->

<!-- ── AUTH MODAL ── -->
<div id="overlay">
 <div id="modal">
  <h2 id="mtitle">&#272;&#259;ng nh&#7853;p</h2>
  <div class="modal-mode"><span class="on" onclick="setAuthMode('login')">&#272;&#259;ng nh&#7853;p</span><span onclick="setAuthMode('reg')">&#272;&#259;ng k&#253;</span></div>
  <div class="fd" id="reg-name"><label>H&#7885; t&#234;n</label><input id="a-name" placeholder="Nguy&#7877;n V&#259;n A"></div>
  <div class="fd"><label>Email</label><input id="a-email" type="email" placeholder="email@example.com"></div>
  <div class="fd"><label>M&#7853;t kh&#7849;u</label><input id="a-pass" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"></div>
  <div id="autherr"></div>
  <div class="macts">
   <button class="btn bo" onclick="hideModal()">H&#7911;y</button>
   <button class="btn bp" id="authgo" onclick="doAuth()">&#272;&#259;ng nh&#7853;p</button>
  </div>
 </div>
</div>

<script>
/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
const S={q:'',type:'all',sac_thue:'',loai:'',year_from:'',year_to:'',tinh_trang:'',
  mode:'hybrid',limit:20,offset:0,total:0,results:[],cur:null,curDetail:null,
  token:localStorage.getItem('vntaxdb_token'),
  user:JSON.parse(localStorage.getItem('vntaxdb_user')||'null'),
  aiRaw:'',authMode:'login',activeCat:''};

const SAC_THUE={QLT:'Quản lý thuế',TNDN:'Thuế TNDN',GTGT:'Thuế GTGT',TNCN:'Thuế TNCN',
  TTDB:'Thuế TTĐB',NHA_THAU:'Nhà thầu',GDLK:'Giao dịch LK',HKD:'Hộ KD',HOA_DON:'Hóa đơn'};
const LOAI_ICON={Luat:'\u{1f3db}\ufe0f',ND:'\u{1f4cb}',TT:'\u{1f4c4}',VBHN:'\u{1f517}',QD:'\u{1f4cc}',NQ:'\u{1f4dc}',CV:'\u{1f4e7}',Khac:'\u{1f4ce}'};
const SAC_COL={QLT:'#607d8b',TNDN:'#e65100',GTGT:'#1565c0',TNCN:'#6a1b9a',TTDB:'#c62828',
  NHA_THAU:'#00838f',GDLK:'#4527a0',HKD:'#2e7d32',HOA_DON:'#ef6c00'};

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  buildYears();initTabs();initFilters();initDrag();initSearch();
  updateAuth();loadHealth();doSearch();
});

function buildYears(){
  const s=document.getElementById('fy'),yr=new Date().getFullYear();
  for(let y=yr;y>=1990;y--){const o=document.createElement('option');o.value=y;o.textContent=y;s.appendChild(o);}
}

/* ── TABS ── */
function initTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    const v=t.dataset.t;
    document.getElementById('psearch').style.display=v==='search'?'flex':'none';
    document.getElementById('pai').style.display=v==='ai'?'flex':'none';
    document.getElementById('pfc').style.display=v==='fc'?'flex':'none';
    if(v==='ai') checkLock('ai');
    if(v==='fc') checkLock('fc');
  });
  // source tabs
  document.querySelectorAll('.st').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.st').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); S.type=t.dataset.s; S.offset=0; doSearch();
  });
  // mode btns
  document.querySelectorAll('.mb').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.mb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); S.mode=b.dataset.m; S.offset=0; doSearch();
  });
  // chips
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{

function initDrag(){
  document.querySelectorAll('.dh').forEach(h=>{
    const pid=h.dataset.panel;
    const panel=document.getElementById(pid);
    h.addEventListener('mousedown',e=>{
      e.preventDefault();
      const sx=e.clientX,sw=panel.offsetWidth;
      h.classList.add('ing');
      const mv=ev=>{panel.style.width=Math.max(80,sw+(ev.clientX-sx))+'px';};
      const up=()=>{h.classList.remove('ing');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });

}

let _st=null;
function initSearch(){
  const inp=document.getElementById('q');
  inp.addEventListener('input',()=>{clearTimeout(_st);_st=setTimeout(()=>{S.q=inp.value.trim();S.offset=0;doSearch();},300);});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(_st);S.q=inp.value.trim();S.offset=0;doSearch();}});

async function doSearch(){
  const p=new URLSearchParams();
  if(S.q) p.set('q',S.q);
  if(S.type!=='all') p.set('type',S.type);
  if(S.sac_thue) p.set('sac_thue',S.sac_thue);
  if(S.loai) p.set('loai',S.loai);
  if(S.year_from) p.set('year_from',S.year_from);
  if(S.year_to) p.set('year_to',S.year_to);
  if(S.tinh_trang) p.set('tinh_trang',S.tinh_trang);
  p.set('mode',S.mode);
  p.set('limit',S.limit);
  p.set('offset',S.offset);
  if(S.token) p.set('_',Date.now()); // cache bust

  document.getElementById('rlist').innerHTML='<div class="ldg"><span class="spin"></span> Đang tìm...</div>';
  try{
    const r=await fetch('/api/search?'+p);
    const d=await r.json();
    S.results=d.results||[];
    S.total=d.total||0;
    renderResults();renderSidebar();updatePagi();
  }catch(e){
    document.getElementById('rlist').innerHTML='<div class="ldg">Lỗi tải dữ liệu</div>';
  }
}

function renderResults(){
  const el=document.getElementById('rlist');
  document.getElementById('rcnt').textContent=S.total+' kết quả';
  if(!S.results.length){el.innerHTML='<div class="ldg">Không tìm thấy kết quả</div>';return;}
  el.innerHTML=S.results.map((r,i)=>{
    const icon=LOAI_ICON[r.loai]||'\u{1f4ce}';
    const yr=r.ngay_ban_hanh?String(r.ngay_ban_hanh).substring(0,4):'';
    const st=r.tinh_trang||'';
    const ok=st==='con_hieu_luc'||st.toLowerCase().includes('còn hiệu lực');
    const ex=st==='het_hieu_luc'||st.toLowerCase().includes('hết hiệu lực');
    const sacs=(r.sac_thue||[]).map(s=>`<span class="bg bg-s" style="background:${SAC_COL[s]||'#666'}">${esc(SAC_THUE[s]||s)}</span>`).join('');
    const srcLabel=r.source==='cong_van'?' [CV]':r.source==='articles'?' [BV]':'';
    return `<div class="rc" data-i="${i}" onclick="selResult(${i})">
<div class="rt">${esc(r.ten||r.so_hieu||'—')}${srcLabel}</div>
<div class="rm">
<span class="bg bg-l">${icon} ${esc(r.loai||'')}</span>
${sacs}
${yr?`<span class="bg bg-y">${yr}</span>`:''}
${ok?'<span class="bg bg-ok">✅ Còn HL</span>':''}
${ex?'<span class="bg bg-ex">❌ Hết HL</span>':''}
</div>
${r.snippet?`<div class="rs">${esc(r.snippet)}</div>`:''}
</div>`;
  }).join('');
}

function renderSidebar(){
  const counts={};
  S.results.forEach(r=>(r.sac_thue||[]).forEach(s=>{counts[s]=(counts[s]||0)+1;}));
  document.getElementById('cats').innerHTML=Object.entries(SAC_THUE).map(([k,v])=>{
    const c=counts[k]||0;
    const on=S.activeCat===k?' on':'';
    return `<div class="ci${on}" onclick="toggleCat('${k}')"><span>${v}</span><span class="cc">${c}</span></div>`;
  }).join('');
}

function toggleCat(k){
  if(S.activeCat===k){S.activeCat='';S.sac_thue='';document.getElementById('fs').value='';}
  else{S.activeCat=k;S.sac_thue=k;document.getElementById('fs').value=k;}
  S.offset=0;doSearch();
}

function updatePagi(){
  const tp=Math.max(1,Math.ceil(S.total/S.limit));
  const cp=Math.floor(S.offset/S.limit)+1;
  document.getElementById('pgi').textContent=cp+'/'+tp;
  document.getElementById('pgp').disabled=cp<=1;
  document.getElementById('pgn').disabled=cp>=tp;
}
function goPage(d){S.offset=Math.max(0,S.offset+d*S.limit);doSearch();}

async function selResult(i){
  const r=S.results[i]; if(!r)return;
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('on'));
  document.querySelector(`.rc[data-i="${i}"]`)?.classList.add('on');
  S.cur=r;
  document.getElementById('ptitle').textContent=(r.so_hieu||'')+' — '+(r.ten||'');
  document.getElementById('banalyze').style.display='';
  const pc=document.getElementById('pcont');
  pc.innerHTML='<div class="ldg"><span class="spin"></span> Đang tải...</div>';

  // Preview logic based on source
  const src=r.source||'documents';
  if(src==='documents' && r.github_path){
    // iframe from vntaxdoc
    pc.innerHTML=`<iframe id="preview-iframe" src="https://vntaxdoc.gpt4vn.com/docs/${esc(r.github_path)}"></iframe>`;
    document.getElementById('bopen').style.display='';
    document.getElementById('bopen').onclick=()=>window.open(`https://vntaxdoc.gpt4vn.com/docs/${r.github_path}`,'_blank');
    S.curDetail=r;
    return;
  }

  // Fetch detail
  try{
    let url;
    if(src==='cong_van') url=`/api/cong_van/${r.id}`;
    else if(src==='articles') url=`/api/articles/${r.id}`;
    else url=`/api/documents/${r.id}`;
    const resp=await fetch(url);
    if(!resp.ok) throw new Error();
    const doc=await resp.json();
    S.curDetail={...r,...doc};
    renderPreview(doc,src);
  }catch{
    pc.innerHTML='<div class="ldg">Không tải được nội dung</div>';
  }
}

  const ts=d.tinh_trang||'';
  if(ts){

    h+=`<b>Hiệu lực:</b> <span style="color:${ok?'#2e7d32':'#c62828'};font-weight:600">${ok?'✅ Còn hiệu lực':'❌ Hết hiệu lực'}</span>`;

  if(d.luu_y) h+=`<div style="background:#fff3e0;padding:10px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;line-height:1.6;border-left:3px solid #ef6c00"><b>⚠ Lưu ý:</b> ${esc(d.luu_y)}</div>`;

    if(d.noi_dung) h+=`<div style="line-height:1.7;white-space:pre-wrap;font-size:13px">${esc(d.noi_dung)}</div>`;
    else if(d.github_path) h+=`<div style="text-align:center;padding:30px"><a href="https://vntaxdoc.gpt4vn.com/docs/${esc(d.github_path)}" target="_blank" class="btn bp">↗ Xem toàn văn</a></div>`;

  if(d.link_tvpl) links+=`<a href="${esc(d.link_tvpl)}" target="_blank" style="font-size:12px;margin-right:12px">TVPL ↗</a>`;

async function submitAI(){
  if(!S.token){showModal();return;}
  const q=document.getElementById('aiq').value.trim();
  if(!q)return;
  const out=document.getElementById('aiout');
  const cites=document.getElementById('ai-cites');
  out.innerHTML='<div class="ldg"><span class="spin"></span> Đang phân tích...</div>';
  cites.style.display='none';
  document.getElementById('ai-acts').style.display='none';
  document.getElementById('aibtn').disabled=true;
  S.aiRaw='';

  try{
    const resp=await fetch('/api/ai/quick-analysis',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body:JSON.stringify({question:q})
    });
    if(resp.status===401){clearAuth();showModal();return;}
    if(resp.status===429){out.innerHTML='<div class="ldg">⚠ Đã hết lượt sử dụng AI. Vui lòng nâng cấp.</div>';return;}
    if(!resp.ok) throw new Error();

    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let full='';
    out.innerHTML='';

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      for(const line of dec.decode(value).split('\n')){
        if(!line.startsWith('data: ')) continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='text'){full+=d.content;out.innerHTML=mdRender(full);}
          if(d.type==='citations'&&d.docs&&d.docs.length){
            cites.innerHTML=d.docs.map(c=>`<span class="cite-chip" onclick="loadCiteDoc('${esc(c.so_hieu)}')" title="${esc(c.ten||'')}">${esc(c.so_hieu)}</span>`).join('');
            cites.style.display='flex';
          }
          if(d.type==='done') break;
          if(d.type==='error'){out.innerHTML=`<div class="ldg">⚠ ${esc(d.content)}</div>`;return;}
        }catch{}
      }
    }
    S.aiRaw=full;
    if(full) document.getElementById('ai-acts').style.display='flex';
  }catch{
    out.innerHTML='<div class="ldg">Lỗi khi phân tích. Vui lòng thử lại.</div>';
  }finally{
    document.getElementById('aibtn').disabled=false;
  }
}

function mdRender(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^#### (.+)$/gm,'<h4 style="color:var(--pri);margin:10px 0 4px;font-size:13px">$1</h4>')
    .replace(/^### (.+)$/gm,'<h4 style="color:var(--pri);margin:12px 0 5px">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 style="color:var(--pri);margin:14px 0 6px">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^\- (.+)$/gm,'<li style="margin:2px 0">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li style="margin:2px 0">$1. $2</li>')
    .replace(/\n\n+/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

/* ── FACTCHECK ── */
async function submitFC(){
  if(!S.token){showModal();return;}
  const txt=document.getElementById('fcinp').value.trim();
  if(!txt)return;
  const out=document.getElementById('fcout');
  out.innerHTML='<div class="ldg"><span class="spin"></span> Đang kiểm tra...</div>';
  document.getElementById('fcbtn').disabled=true;

  try{
    const resp=await fetch('/api/ai/factcheck',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body:JSON.stringify({text:txt})
    });
    if(resp.status===401){clearAuth();showModal();return;}
    if(!resp.ok) throw new Error();
    const data=await resp.json();
    const cits=data.citations||[];
    if(!cits.length){out.innerHTML='<div class="ldg">Không tìm thấy trích dẫn văn bản nào trong đoạn văn.</div>';return;}

    let h='<table><thead><tr><th>VB trích dẫn</th><th>Tìm thấy trong DB</th><th>Trạng thái</th></tr></thead><tbody>';
    cits.forEach(c=>{
      let stHtml,stClass;
      if(c.status==='valid'){stHtml='✅ Hợp lệ';stClass='st-valid';}
      else if(c.status==='expired'){stHtml='⚠️ Hết hiệu lực';stClass='st-expired';}
      else{stHtml='❌ Không tìm thấy';stClass='st-notfound';}
      const found=c.found?`<a href="#" onclick="event.preventDefault();viewFCDoc('${c.source}',${c.doc_id})">${esc(c.found)}</a><br><span style="font-size:11px;color:#888">${esc(c.ten||'')}</span>`:'—';
      h+=`<tr><td>${esc(c.claimed)}</td><td>${found}</td><td class="${stClass}">${stHtml}</td></tr>`;
    });
    h+='</tbody></table>';
    h+=`<div style="margin-top:10px;font-size:12px;color:#888">Tìm thấy: ${data.total_found}/${cits.length} văn bản</div>`;
    out.innerHTML=h;
  }catch{
    out.innerHTML='<div class="ldg">Lỗi khi kiểm tra</div>';
  }finally{
    document.getElementById('fcbtn').disabled=false;
  }
}

    try{
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      if(!r.ok){const d=await r.json().catch(()=>({}));err.textContent=d.detail||'Sai email hoặc mật khẩu';err.style.display='block';return;}
      const d=await r.json();
      S.token=d.token;S.user=d.user;
      localStorage.setItem('vntaxdb_token',d.token);
      localStorage.setItem('vntaxdb_user',JSON.stringify(d.user));
      hideModal();updateAuth();
    }catch{err.textContent='Lỗi kết nối';err.style.display='block';}
  }else{
    const ho_ten=document.getElementById('a-name').value.trim();
    try{
      const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,ho_ten})});
      if(!r.ok){const d=await r.json().catch(()=>({}));err.textContent=d.detail||'Không thể đăng ký';err.style.display='block';return;}
      const d=await r.json();
      S.token=d.token;S.user=d.user;
      localStorage.setItem('vntaxdb_token',d.token);
      localStorage.setItem('vntaxdb_user',JSON.stringify(d.user));
      hideModal();updateAuth();
    }catch{err.textContent='Lỗi kết nối';err.style.display='block';}
  }
}

function logout(){clearAuth();updateAuth();}
function clearAuth(){S.token=null;S.user=null;localStorage.removeItem('vntaxdb_token');localStorage.removeItem('vntaxdb_user');}
function updateAuth(){
  const li=!!S.token;
  document.getElementById('loginb').style.display=li?'none':'';
  document.getElementById('logoutb').style.display=li?'':'none';
  document.getElementById('uname').style.display=li?'':'none';
  if(li) document.getElementById('uname').textContent='Xin chào, '+(S.user?.ho_ten||S.user?.email||'User');
  checkLock('ai');checkLock('fc');
}

// Enter/Escape in modal
document.addEventListener('keydown',e=>{
  if(document.getElementById('overlay').classList.contains('show')){
    if(e.key==='Enter')doAuth();
    if(e.key==='Escape')hideModal();
  }
});

/* ── HELPERS ── */
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return'';try{const p=String(d).split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch{return d;}}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelector(`.tab[data-t="${t}"]`).classList.add('on');
  document.getElementById('psearch').style.display=t==='search'?'flex':'none';
  document.getElementById('pai').style.display=t==='ai'?'flex':'none';
  document.getElementById('pfc').style.display=t==='fc'?'flex':'none';
  if(t==='ai')checkLock('ai');
  if(t==='fc')checkLock('fc');
}
</script>
